name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev,docs]"
      - run: pytest
      - run: mkdocs build --strict
      - run: python -m build
      - run: python -m twine check dist/*
      - run: |
          python -m venv /tmp/psihub-wheel-smoke
          /tmp/psihub-wheel-smoke/bin/python -m pip install -U pip
          /tmp/psihub-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/psihub-wheel-smoke/bin/python -c "from psihub import LocalHub; print(LocalHub.__name__)"
